name: Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: fsnav-linux
          - os: macos-latest
            artifact: fsnav-macos
          - os: windows-latest
            artifact: fsnav-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxi-dev libgl1-mesa-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo build --release --verbose

      - name: Build universal macOS binary
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin --verbose
          cargo build --release --target x86_64-apple-darwin --verbose
          mkdir -p target/release
          lipo -create -output target/release/fsnav \
            target/aarch64-apple-darwin/release/fsnav \
            target/x86_64-apple-darwin/release/fsnav
          lipo -info target/release/fsnav

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/fsnav
            target/release/fsnav.exe
