<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- fsnav app icon: a low fsn-style field of boxes receding to a horizon,
       with one tall hot disk-usage spike. Captures both the 3D filesystem
       visualizer and the disk-usage "what's eating my disk" feature. -->
  <defs>
    <!-- rounded-rect mask for the macOS-style icon shape -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="114" ry="114"/>
    </clipPath>
    <!-- sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#121a2e"/>
      <stop offset="1" stop-color="#1b2540"/>
    </linearGradient>
    <!-- ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203a"/>
      <stop offset="1" stop-color="#0d1424"/>
    </linearGradient>
    <!-- hot spike gradient -->
    <linearGradient id="spike" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb24a"/>
      <stop offset="0.5" stop-color="#ff7a2f"/>
      <stop offset="1" stop-color="#e8541f"/>
    </linearGradient>
    <linearGradient id="boxg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa0ff"/>
      <stop offset="1" stop-color="#3f78d6"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- backdrop -->
    <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>
    <!-- ground plane (horizon around y=210) -->
    <rect x="0" y="210" width="512" height="302" fill="url(#ground)"/>

    <!-- perspective grid lines on the ground -->
    <g stroke="#2c3a5e" stroke-width="2" opacity="0.7">
      <!-- horizontal (depth) lines getting closer together toward horizon -->
      <line x1="0" y1="230" x2="512" y2="230"/>
      <line x1="0" y1="258" x2="512" y2="258"/>
      <line x1="0" y1="296" x2="512" y2="296"/>
      <line x1="0" y1="346" x2="512" y2="346"/>
      <line x1="0" y1="410" x2="512" y2="410"/>
      <line x1="0" y1="490" x2="512" y2="490"/>
      <!-- converging vertical lines toward a vanishing point at (256,210) -->
      <line x1="256" y1="210" x2="-40" y2="512"/>
      <line x1="256" y1="210" x2="100" y2="512"/>
      <line x1="256" y1="210" x2="200" y2="512"/>
      <line x1="256" y1="210" x2="312" y2="512"/>
      <line x1="256" y1="210" x2="412" y2="512"/>
      <line x1="256" y1="210" x2="552" y2="512"/>
    </g>

    <!-- a couple of small blue file boxes on the field -->
    <!-- left box -->
    <g>
      <polygon points="92,372 132,360 132,400 92,412" fill="url(#boxg)"/>
      <polygon points="132,360 172,372 172,412 132,400" fill="#356cc4"/>
      <polygon points="92,372 132,360 172,372 132,384" fill="#7ab0ff"/>
    </g>
    <!-- right box -->
    <g>
      <polygon points="356,360 396,348 396,388 356,400" fill="url(#boxg)"/>
      <polygon points="396,348 436,360 436,400 396,388" fill="#356cc4"/>
      <polygon points="356,360 396,348 436,360 396,372" fill="#7ab0ff"/>
    </g>

    <!-- the tall hot disk-usage spike, center stage -->
    <g>
      <!-- left face -->
      <polygon points="216,150 248,138 248,392 216,404" fill="#d8481b"/>
      <!-- right face -->
      <polygon points="248,138 288,150 288,404 248,392" fill="#b73c17"/>
      <!-- front body face (brightest, faces viewer) -->
      <polygon points="216,150 248,162 288,150 288,404 248,416 216,404" fill="url(#spike)"/>
      <!-- top cap -->
      <polygon points="216,150 248,138 288,150 256,162" fill="#ffc164"/>
    </g>

    <!-- selection ring glow at the spike base -->
    <ellipse cx="252" cy="414" rx="78" ry="20" fill="none" stroke="#ffe07a" stroke-width="4" opacity="0.85"/>
    <ellipse cx="252" cy="414" rx="104" ry="27" fill="none" stroke="#ffe07a" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
